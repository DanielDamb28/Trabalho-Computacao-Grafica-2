<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Picking via WebXR - CG</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #000;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            border-radius: 12px;
            text-align: center;
            z-index: 10;
            border: 2px solid #ff00ff;
            pointer-events: none;
            transition: border-color 0.3s;
        }

        #status {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        #info-carga {
            font-size: 0.9em;
        }

        .color-label {
            padding: 2px 6px;
            border-radius: 4px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <div id="status">ESCANEANDO AMBIENTE...</div>
        <div id="info-carga">Aguardando detecção de superfície</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer, reticle, ghostBox;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        const boxes = [];
        const raycaster = new THREE.Raycaster();
        const VOL_X = 0.008, VOL_Y = 0.002;
        const PALLET_SIZE = 1;

        let nextBoxData = { w: 0.1, h: 0.1, d: 0.1, color: 0xff00ff, type: 'PENDING', hex: '#ff00ff' };

        init();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            }));

            renderer.xr.getController(0).addEventListener('select', onSelect);

            reticle = new THREE.Group();

            const circleGeom = new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2);
            const circleMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const circleMesh = new THREE.Mesh(circleGeom, circleMat);
            circleMesh.name = "miraBusca";
            reticle.add(circleMesh);

            const rectGeom = new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1));
            const rectMat = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
            const rectMesh = new THREE.LineSegments(rectGeom, rectMat);
            rectMesh.rotateX(-Math.PI / 2);
            rectMesh.name = "miraEncaixe";
            rectMesh.visible = false;
            reticle.add(rectMesh);

            reticle.visible = false;
            scene.add(reticle);

            ghostBox = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.5 })
            );
            ghostBox.visible = false;
            scene.add(ghostBox);

            rollNextBox();
            renderer.setAnimationLoop(animate);
        }

        function rollNextBox() {
            const randomColor = Math.random();
            if (randomColor < 0.33) {
                nextBoxData.w = Math.random() * 0.22 + 0.15;
                nextBoxData.h = Math.random() * 0.18 + 0.12;
                nextBoxData.d = Math.random() * 0.22 + 0.15;
            } else if (randomColor < 0.66) {
                nextBoxData.w = Math.random() * 0.14 + 0.10;
                nextBoxData.h = Math.random() * 0.12 + 0.08;
                nextBoxData.d = Math.random() * 0.14 + 0.10;
            } else {
                nextBoxData.w = Math.random() * 0.08 + 0.04;
                nextBoxData.h = Math.random() * 0.06 + 0.04;
                nextBoxData.d = Math.random() * 0.08 + 0.04;
            }

            const vol = nextBoxData.w * nextBoxData.h * nextBoxData.d;
            if (vol > VOL_X) { nextBoxData.type = 'VERMELHA'; nextBoxData.hex = '#BF4646'; nextBoxData.color = 0xBF4646; }
            else if (vol < VOL_Y) { nextBoxData.type = 'AZUL'; nextBoxData.hex = '#261CC1'; nextBoxData.color = 0x261CC1; }
            else { nextBoxData.type = 'VERDE'; nextBoxData.hex = '#237227'; nextBoxData.color = 0x237227; }

            ghostBox.geometry.dispose();
            ghostBox.geometry = new THREE.BoxGeometry(nextBoxData.w, nextBoxData.h, nextBoxData.d);

            const miraEncaixe = reticle.getObjectByName("miraEncaixe");
            if (miraEncaixe) miraEncaixe.scale.set(nextBoxData.w, nextBoxData.d, 1);

            document.getElementById('info-carga').innerHTML = `Próxima Carga: <span class="color-label" style="background:${nextBoxData.hex}">${nextBoxData.type}</span>`;
        }

        function isPositionFree(pos, w, h, d) {
            const boxMargin = 0.005;
            const newBoxBB = new THREE.Box3().setFromCenterAndSize(
                new THREE.Vector3(pos.x, pos.y + h / 2, pos.z),
                new THREE.Vector3(w - boxMargin, h - boxMargin, d - boxMargin)
            );
            for (let box of boxes) {
                const otherBoxBB = new THREE.Box3().setFromObject(box);
                if (newBoxBB.intersectsBox(otherBoxBB)) {
                    const yDiff = Math.abs((pos.y + h / 2) - box.position.y);
                    if (yDiff < (h / 2 + box.userData.h / 2) - 0.01) return false;
                }
            }
            return true;
        }

        function isWithinPalletBounds(pos, w, d) {
            if (boxes.length === 0) return true;
            const pallet = boxes[0];
            const pX = pallet.position.x;
            const pZ = pallet.position.z;
            const limit = PALLET_SIZE / 2;
            const boxMinX = pos.x - (w / 2);
            const boxMaxX = pos.x + (w / 2);
            const boxMinZ = pos.z - (d / 2);
            const boxMaxZ = pos.z + (d / 2);
            return boxMinX >= (pX - limit) && boxMaxX <= (pX + limit) && boxMinZ >= (pZ - limit) && boxMaxZ <= (pZ + limit);
        }

        function onSelect() {
            if (!reticle.visible) return;
            const areaLivre = boxes.length === 0 || isPositionFree(reticle.position, nextBoxData.w, nextBoxData.h, nextBoxData.d);
            const dentroDoPalete = isWithinPalletBounds(reticle.position, nextBoxData.w, nextBoxData.d);
            if (!areaLivre || !dentroDoPalete) return;

            if (boxes.length === 0) {
                spawnObject(null, true, reticle.position);
            } else {
                raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                const intersects = raycaster.intersectObjects(boxes);
                if (intersects.length > 0 && intersects[0].face.normal.y > 0.5) {
                    spawnObject(intersects[0].object, false, reticle.position);
                }
            }
        }

        function spawnObject(target, isPallet, pos) {
            let w = isPallet ? PALLET_SIZE : nextBoxData.w;
            let h = isPallet ? 0.08 : nextBoxData.h;
            let d = isPallet ? PALLET_SIZE : nextBoxData.d;
            let color = isPallet ? 0xC0B87A : nextBoxData.color;

            if (!isPallet && target.userData.type !== 'PALETE' && !checkStackRule(nextBoxData.rawType(), target.userData.rawType)) return;

            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.9 })
            );
            mesh.position.set(pos.x, pos.y + (h / 2), pos.z);
            mesh.userData = { type: isPallet ? 'PALETE' : nextBoxData.type, rawType: isPallet ? 'PALLET' : nextBoxData.rawType(), h: h };
            scene.add(mesh);
            boxes.push(mesh);
            if (!isPallet) rollNextBox();
            document.getElementById('status').innerText = isPallet ? "PALETE POSICIONADO" : "CARGA EMPILHADA";
        }

        nextBoxData.rawType = function () {
            if (this.type === 'VERMELHA') return 'RED';
            if (this.type === 'VERDE') return 'GREEN';
            if (this.type === 'AZUL') return 'BLUE';
            return 'PALLET';
        };

        function checkStackRule(top, bottom) {
            return (top === bottom || (top === 'BLUE' && (bottom === 'GREEN' || bottom === 'RED')) || (top === 'GREEN' && bottom === 'RED'));
        }

        function animate(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();
                raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                const intersects = raycaster.intersectObjects(boxes);

                const miraBusca = reticle.getObjectByName("miraBusca");
                const miraEncaixe = reticle.getObjectByName("miraEncaixe");

                if (intersects.length > 0) {
                    const hit = intersects[0];
                    reticle.visible = true;
                    miraBusca.visible = false;
                    miraEncaixe.visible = true;

                    const snap = 0.005;
                    reticle.position.set(
                        Math.round(hit.point.x / snap) * snap,
                        hit.point.y + 0.002,
                        Math.round(hit.point.z / snap) * snap
                    );

                    ghostBox.visible = true;
                    ghostBox.position.set(reticle.position.x, reticle.position.y + (nextBoxData.h / 2), reticle.position.z);

                    const areaLivre = isPositionFree(reticle.position, nextBoxData.w, nextBoxData.h, nextBoxData.d);
                    const regraValida = (hit.object.userData.rawType === 'PALLET' || checkStackRule(nextBoxData.rawType(), hit.object.userData.rawType));
                    const dentroDoPalete = isWithinPalletBounds(reticle.position, nextBoxData.w, nextBoxData.d);

                    if (!dentroDoPalete) {
                        ghostBox.material.color.setHex(0xffaa00);
                        document.getElementById('status').innerText = "FORA DO LIMITE DO PALETE";
                        document.getElementById('overlay').style.borderColor = '#ffaa00';
                    } else if (!areaLivre || !regraValida) {
                        ghostBox.material.color.setHex(0xff0000);
                        document.getElementById('status').innerText = !areaLivre ? "ESPAÇO OCUPADO" : "EMPILHAMENTO INVÁLIDO";
                        document.getElementById('overlay').style.borderColor = '#ff0000';
                    } else {
                        ghostBox.material.color.setHex(0xff00ff);
                        document.getElementById('status').innerText = "POSIÇÃO VÁLIDA";
                        document.getElementById('overlay').style.borderColor = '#ff00ff';
                    }

                } else if (boxes.length === 0) {
                    ghostBox.visible = false;
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((ref) => {
                            session.requestHitTestSource({ space: ref }).then((src) => hitTestSource = src);
                        });
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource) {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length) {
                            reticle.visible = true;

                            miraBusca.visible = true;
                            miraEncaixe.visible = false;

                            const hitPose = results[0].getPose(referenceSpace);
                            reticle.position.set(hitPose.transform.position.x, hitPose.transform.position.y, hitPose.transform.position.z);
                            document.getElementById('status').innerText = "LOCALIZE O CHÃO";
                        } else { reticle.visible = false; }
                    }
                } else {
                    reticle.visible = false; ghostBox.visible = false;
                    document.getElementById('status').innerText = "MIRE NO PALETE";
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
