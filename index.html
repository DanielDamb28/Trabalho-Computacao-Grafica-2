<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Logística AR - Picking Inteligente</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #000;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            border-radius: 12px;
            text-align: center;
            z-index: 10;
            border: 2px solid #ff00ff;
            pointer-events: none;
            transition: border-color 0.3s;
        }

        #status {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        #info-carga {
            font-size: 0.9em;
        }

        .color-label {
            padding: 2px 6px;
            border-radius: 4px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <div id="status">ESCANEANDO AMBIENTE...</div>
        <div id="info-carga">Aguardando detecção de superfície</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        function sendLog(message) {
            fetch('/log', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: typeof message === 'object' ? JSON.stringify(message) : message
            }).catch(() => { });
        }

        let camera, scene, renderer, reticle, ghostBox;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        const boxes = [];
        const raycaster = new THREE.Raycaster();

        const VOL_X = 0.008;
        const VOL_Y = 0.002;

        let nextBoxData = { w: 0.1, h: 0.1, d: 0.1, color: 0xff00ff, type: 'PENDING', hex: '#ff00ff' };

        init();

        function init() {
            const container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            }));

            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00, depthTest: false })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            ghostBox = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.5 })
            );
            ghostBox.visible = false;
            scene.add(ghostBox);

            rollNextBox();
            renderer.setAnimationLoop(animate);
        }

        function rollNextBox() {
            // 1. SORTEIA A COR PRIMEIRO (Garante equilíbrio entre as 3)
            const randomColor = Math.random();
            let targetType = '';

            // 2. DEFINE AS DIMENSÕES BASEADAS NA COR SORTEADA
            if (randomColor < 0.33) {
                // FOCO EM VERMELHO (Volume > 0.008)
                // Dimensões entre 0.20 e 0.25 -> Méd de 0.22^3 = 0.010
                nextBoxData.w = Math.random() * 0.05 + 0.20;
                nextBoxData.h = Math.random() * 0.05 + 0.20;
                nextBoxData.d = Math.random() * 0.05 + 0.20;
                targetType = 'VERMELHA';
            }
            else if (randomColor < 0.66) {
                // FOCO EM VERDE (Volume entre 0.002 e 0.008)
                // Dimensões entre 0.14 e 0.18 -> Méd de 0.16^3 = 0.004
                nextBoxData.w = Math.random() * 0.04 + 0.14;
                nextBoxData.h = Math.random() * 0.04 + 0.14;
                nextBoxData.d = Math.random() * 0.04 + 0.14;
                targetType = 'VERDE';
            }
            else {
                // FOCO EM AZUL (Volume < 0.002)
                // Dimensões entre 0.08 e 0.11 -> Méd de 0.10^3 = 0.001
                nextBoxData.w = Math.random() * 0.03 + 0.08;
                nextBoxData.h = Math.random() * 0.03 + 0.08;
                nextBoxData.d = Math.random() * 0.03 + 0.08;
                targetType = 'AZUL';
            }

            const vol = nextBoxData.w * nextBoxData.h * nextBoxData.d;

            // 3. ATRIBUIÇÃO FINAL DE CORES PARA O SISTEMA
            if (vol > VOL_X) {
                nextBoxData.color = 0xff0000; nextBoxData.type = 'VERMELHA'; nextBoxData.hex = '#ff4444';
            } else if (vol < VOL_Y) {
                nextBoxData.color = 0x0000ff; nextBoxData.type = 'AZUL'; nextBoxData.hex = '#4444ff';
            } else {
                nextBoxData.color = 0x00ff00; nextBoxData.type = 'VERDE'; nextBoxData.hex = '#44ff44';
            }

            // Atualiza a geometria do Ghost Box
            ghostBox.geometry.dispose();
            ghostBox.geometry = new THREE.BoxGeometry(nextBoxData.w, nextBoxData.h, nextBoxData.d);

            updateOverlayInfo(`Próxima Carga: <span class="color-label" style="background:${nextBoxData.hex}">${nextBoxData.type}</span>`);
            sendLog(`EQUILÍBRIO: Sorteada ${nextBoxData.type} | Vol: ${vol.toFixed(6)}`);
        }

        function updateOverlayInfo(html) {
            document.getElementById('info-carga').innerHTML = html;
        }

        function onSelect() {
            if (!reticle.visible) return;

            const position = new THREE.Vector3();
            reticle.matrix.decompose(position, new THREE.Quaternion(), new THREE.Vector3());

            if (boxes.length === 0) {
                spawnObject(null, true, position);
            } else {
                raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                const intersects = raycaster.intersectObjects(boxes);

                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    if (intersect.face.normal.y > 0.5) {
                        spawnObject(intersect.object, false, intersect.point);
                    }
                }
            }
        }

        function spawnObject(target, isPallet, hitPoint) {
            let w, h, d, color, type, volume;

            if (isPallet) {
                w = 0.5; h = 0.04; d = 0.5;
                color = 0x8B4513; type = 'PALETE';
            } else {
                w = nextBoxData.w; h = nextBoxData.h; d = nextBoxData.d;
                color = nextBoxData.color; type = nextBoxData.type;
                volume = w * h * d;
                sendLog(`Info: ${type} Volume ${volume.toFixed(4)} m³`);


                if (target.userData.type !== 'PALETE' && !checkStackRule(nextBoxData.rawType(), target.userData.rawType)) {
                    sendLog(`ERRO: ${type} bloqueado sobre ${target.userData.type}`);
                    return;
                }
            }

            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.9 })
            );

            mesh.position.set(hitPoint.x, hitPoint.y + (h / 2), hitPoint.z);
            mesh.userData = { type: type, rawType: isPallet ? 'PALLET' : nextBoxData.rawType(), h: h };

            scene.add(mesh);
            boxes.push(mesh);

            sendLog({ event: "SPAWN", type: type, pos: mesh.position });

            if (!isPallet) rollNextBox();
            document.getElementById('status').innerText = isPallet ? "PALETE POSICIONADO" : "CARGA EMPILHADA";
            document.getElementById('overlay').style.borderColor = '#ff00ff';
        }

        // Função auxiliar para mapear nomes PT para as regras EN
        nextBoxData.rawType = function () {
            if (this.type === 'VERMELHA') return 'RED';
            if (this.type === 'VERDE') return 'GREEN';
            if (this.type === 'AZUL') return 'BLUE';
            return 'PALLET';
        };

        function checkStackRule(top, bottom) {
            if (top === bottom) return true;
            if (top === 'BLUE' && (bottom === 'GREEN' || bottom === 'RED')) return true;
            if (top === 'GREEN' && bottom === 'RED') return true;
            return false;
        }

        function animate(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                const intersects = raycaster.intersectObjects(boxes);

                if (intersects.length > 0) {
                    const hit = intersects[0];
                    reticle.visible = true;
                    reticle.matrix.makeTranslation(hit.point.x, hit.point.y + 0.001, hit.point.z);
                    reticle.material.color.setHex(0xff00ff);

                    ghostBox.visible = true;
                    ghostBox.position.set(hit.point.x, hit.point.y + (nextBoxData.h / 2), hit.point.z);

                    if (hit.object.userData.rawType !== 'PALLET' && !checkStackRule(nextBoxData.rawType(), hit.object.userData.rawType)) {
                        ghostBox.material.color.setHex(0xff0000);
                        document.getElementById('status').innerText = "EMPILHAMENTO INVÁLIDO";
                        document.getElementById('status').style.color = "#ff4444";
                        updateOverlayInfo(`Motivo: <span style="color:#ff4444">${nextBoxData.type} não suportada por ${hit.object.userData.type}</span>`);
                        document.getElementById('overlay').style.borderColor = '#ff0000';
                    } else {
                        ghostBox.material.color.setHex(0xff00ff);
                        document.getElementById('status').innerText = "POSIÇÃO VÁLIDA";
                        document.getElementById('status').style.color = "#ffffff";
                        updateOverlayInfo(`Próxima: <span class="color-label" style="background:${nextBoxData.hex}">${nextBoxData.type}</span>`);
                        document.getElementById('overlay').style.borderColor = '#ff00ff';
                    }

                } else if (boxes.length === 0) {
                    ghostBox.visible = false;
                    if (!hitTestSourceRequested) {
                        session.requestReferenceSpace('viewer').then((ref) => {
                            session.requestHitTestSource({ space: ref }).then((src) => hitTestSource = src);
                        });
                        hitTestSourceRequested = true;
                    }
                    if (hitTestSource) {
                        const results = frame.getHitTestResults(hitTestSource);
                        if (results.length) {
                            reticle.visible = true;
                            reticle.matrix.fromArray(results[0].getPose(referenceSpace).transform.matrix);
                            reticle.material.color.setHex(0x00ff00);
                            document.getElementById('status').innerText = "LOCALIZE O CHÃO";
                        } else { reticle.visible = false; }
                    }
                } else {
                    reticle.visible = false;
                    ghostBox.visible = false;
                    document.getElementById('status').innerText = "MIRE NO PALETE";
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
